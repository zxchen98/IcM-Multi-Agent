<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Robot head background -->
  <rect x="4" y="6" width="24" height="20" rx="4" fill="#4F46E5" stroke="#3730A3" stroke-width="1"/>
  
  <!-- Robot eyes -->
  <circle cx="12" cy="14" r="3" fill="#60A5FA"/>
  <circle cx="20" cy="14" r="3" fill="#60A5FA"/>
  <circle cx="12" cy="14" r="1.5" fill="#1E40AF"/>
  <circle cx="20" cy="14" r="1.5" fill="#1E40AF"/>
  
  <!-- Robot mouth -->
  <rect x="14" y="20" width="4" height="2" rx="1" fill="#60A5FA"/>
  
  <!-- Robot antennas -->
  <line x1="10" y1="6" x2="10" y2="2" stroke="#4F46E5" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="6" x2="22" y2="2" stroke="#4F46E5" stroke-width="2" stroke-linecap="round"/>
  <circle cx="10" cy="2" r="1.5" fill="#EF4444"/>
  <circle cx="22" cy="2" r="1.5" fill="#10B981"/>
  
  <!-- Robot body hint -->
  <rect x="12" y="26" width="8" height="4" rx="2" fill="#6B7280"/>
</svg>

